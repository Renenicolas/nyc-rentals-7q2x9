<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NYC Rentals · Rene</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1e222c; --line:#2a2f3a;
    --txt:#e8eaf0; --mut:#9aa3b2; --acc:#5b8cff; --acc2:#3a6ad4;
    --new:#21c07a; --contacted:#5b8cff; --showing:#f5a623; --off:#6b7280; --pass:#ef5350;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  header{position:sticky;top:0;z-index:20;background:rgba(15,17,21,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:14px 20px}
  .titlerow{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  h1{font-size:19px;margin:0;font-weight:700;letter-spacing:.2px}
  #crit{color:var(--mut);font-size:12.5px}
  #gen{color:var(--mut);font-size:11.5px;margin-left:auto}
  #stats{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
  .statbox{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 14px;min-width:84px}
  .statbox .n{font-size:20px;font-weight:700}
  .statbox .l{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px}
  .statbox.s-new .n{color:var(--new)} .statbox.s-contacted .n{color:var(--contacted)}
  .statbox.s-showing .n{color:var(--showing)} .statbox.s-off .n{color:var(--off)}
  .controls{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;align-items:center}
  input,select{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:13px;outline:none}
  input:focus,select:focus{border-color:var(--acc)}
  #q{min-width:200px;flex:1}
  input[type=number]{width:96px}
  label.chk{display:flex;align-items:center;gap:6px;color:var(--mut);font-size:12.5px}
  .ctrlbtn{background:var(--acc2);border:none;color:#fff;cursor:pointer;font-weight:600}
  .ctrlbtn.ghost{background:var(--panel2);border:1px solid var(--line);color:var(--txt)}
  main{padding:18px 20px 60px}
  .hood h2{font-size:15px;margin:22px 0 10px;display:flex;align-items:center;gap:8px;color:#cfd6e4}
  .hood h2 .cnt{font-size:12px;background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:1px 9px;color:var(--mut)}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;position:relative;display:flex;flex-direction:column;transition:border-color .15s,transform .1s}
  .card:hover{border-color:#3a4456;transform:translateY(-1px)}
  .card.off{opacity:.6}
  .ph{height:150px;background:#22262f center/cover no-repeat}
  .ph.noph{display:flex;align-items:center;justify-content:center;color:var(--mut);font-size:12px}
  .newbadge{position:absolute;top:10px;left:10px;background:var(--new);color:#03210f;font-weight:800;font-size:10.5px;letter-spacing:.6px;padding:3px 8px;border-radius:6px}
  .srcbadge{position:absolute;top:10px;right:10px;font-size:9.5px;font-weight:700;letter-spacing:.4px;padding:3px 7px;border-radius:6px;background:rgba(0,0,0,.65);color:#fff}
  .src-craigslist{background:rgba(80,40,140,.9)} .src-renthop{background:rgba(20,110,90,.9)} .src-streeteasy{background:rgba(40,70,150,.9)}
  /* gate */
  #gate{position:fixed;inset:0;z-index:100;background:#0f1115;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
  #gate h2{font-size:22px;margin:0} #gate p{color:var(--mut);margin:0;font-size:13px}
  #gate input{font-size:15px;padding:10px 14px;width:240px;text-align:center}
  #gate button{background:var(--acc2);color:#fff;border:none;border-radius:8px;padding:10px 24px;font-weight:700;cursor:pointer;font-size:14px}
  #gate .err{color:var(--pass);font-size:12.5px;height:14px}
  .body{padding:12px 13px 13px;display:flex;flex-direction:column;gap:6px;flex:1}
  .row1{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
  .price{font-size:19px;font-weight:800}
  .pp{font-size:11.5px;color:var(--mut)}
  .addr{font-weight:600;font-size:14px}
  .meta{color:var(--mut);font-size:12.5px}
  .badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}
  .badge{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px}
  .s-new{background:rgba(33,192,122,.16);color:var(--new)}
  .s-seen{background:#262b35;color:var(--mut)}
  .s-contacted{background:rgba(91,140,255,.16);color:var(--contacted)}
  .s-showing{background:rgba(245,166,35,.16);color:var(--showing)}
  .s-toured,.s-applied{background:rgba(33,192,122,.16);color:var(--new)}
  .s-passed{background:rgba(239,83,80,.16);color:var(--pass)}
  .s-off{background:#23262d;color:var(--off)}
  .chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:2px}
  .chip{font-size:10.5px;background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:2px 7px;color:var(--mut)}
  .broker{font-size:12px;color:#bcd1ff;background:rgba(91,140,255,.08);border-radius:6px;padding:4px 7px}
  .showing{font-size:12px;color:var(--showing)}
  .note{font-size:12px;color:#d7dde9;background:var(--panel2);border-radius:6px;padding:5px 7px;font-style:italic}
  .actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:auto;padding-top:8px}
  .btn{font-size:12px;border-radius:7px;padding:5px 9px;cursor:pointer;border:1px solid var(--line);background:var(--panel2);color:var(--txt);text-decoration:none;display:inline-block}
  .btn:hover{border-color:#3a4456}
  .btn.view{background:var(--acc2);border-color:var(--acc2);color:#fff;font-weight:600}
  .btn.on{background:rgba(239,83,80,.18);border-color:var(--pass);color:var(--pass)}
  .empty{color:var(--mut);text-align:center;padding:60px}
  .modal{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.6);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto}
  .modal.open{display:flex}
  .modal-inner{background:var(--panel);border:1px solid var(--line);border-radius:14px;max-width:820px;width:100%;padding:18px 20px}
  .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .modal-head h2{margin:0;font-size:18px}
  .tour{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--line)}
  .tour .when{min-width:165px;font-weight:700;color:var(--showing);font-size:13px}
  .tour .ta{font-weight:600} .tour .tmeta{color:var(--mut);font-size:12px}
  .tour .ttype{font-size:10.5px;background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:2px 7px;color:var(--mut);margin-left:6px}
  .tour a{color:var(--acc);font-size:12px}
  .ct{display:grid;grid-template-columns:1.3fr 1.2fr 1fr 1.4fr;gap:8px;padding:9px 0;border-bottom:1px solid var(--line);font-size:12.5px;align-items:center}
  .ct .cn{font-weight:600} .ct .cmut{color:var(--mut)} .ct a{color:var(--acc)}
  .ct .stat{font-size:10.5px;padding:2px 7px;border-radius:6px}
  .stat-reply{background:rgba(245,166,35,.18);color:var(--showing)} .stat-neg{background:rgba(33,192,122,.18);color:var(--new)} .stat-wait{background:#262b35;color:var(--mut)}
  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:#fff;color:#111;padding:10px 18px;border-radius:10px;font-weight:600;font-size:13px;opacity:0;pointer-events:none;transition:.25s;box-shadow:0 8px 30px rgba(0,0,0,.4);z-index:50}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="gate">
  <h2>🗽 NYC Rentals</h2>
  <p>Enter the shared password to view the listings.</p>
  <input id="gpw" type="password" placeholder="Password" autocomplete="off" />
  <button id="gbtn">Unlock</button>
  <div class="err" id="gerr"></div>
</div>
<header>
  <div class="titlerow">
    <h1>🗽 NYC Rentals</h1>
    <span id="crit"></span>
    <span id="gen"></span>
  </div>
  <div id="stats"></div>
  <div class="controls">
    <input id="q" placeholder="Search address, neighborhood, amenities…" />
    <select id="hoodSel"></select>
    <select id="statusSel">
      <option value="all">All statuses</option>
      <option value="new">🟢 New only</option>
      <option value="available">Available (not contacted)</option>
      <option value="contacted">Contacted</option>
      <option value="showing">Showing booked</option>
      <option value="passed">Passed</option>
    </select>
    <select id="bedsSel">
      <option value="all">Any beds</option>
      <option value="4">4 bd</option>
      <option value="5">5+ bd</option>
    </select>
    <input id="minP" type="number" placeholder="Min $" />
    <input id="maxP" type="number" placeholder="Max $" />
    <select id="sortSel">
      <option value="hood">Sort: Location</option>
      <option value="price_asc">Price ↑</option>
      <option value="price_desc">Price ↓</option>
      <option value="new">New first</option>
      <option value="beds">Most beds</option>
    </select>
    <button id="toursBtn" class="btn ctrlbtn">📅 Tours</button>
    <button id="contactsBtn" class="btn ctrlbtn ghost" style="display:none">📇 Contacts</button>
    <button id="markAll" class="btn ctrlbtn ghost">Mark all seen</button>
    <button id="export" class="btn ctrlbtn ghost">Export CSV</button>
  </div>
</header>
<main><div id="grid"></div></main>
<div id="modal" class="modal"><div class="modal-inner"><div class="modal-head"><h2 id="modalTitle"></h2><button id="modalClose" class="btn">✕ Close</button></div><div id="modalBody"></div></div></div>
<div id="toast"></div>
<script>
(function(){
  var HASH="55f97fea238e6745a702b80bf98e2dd82efe766fc68a2c378fcc2a840b18efa3";
  var KEY="nycRentalsAuth";
  async function sha(s){var b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(s));return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,"0")).join("");}
  function unlock(){document.getElementById("gate").style.display="none";}
  if(sessionStorage.getItem(KEY)===HASH||localStorage.getItem(KEY)===HASH){unlock();}
  async function tryPw(){var v=document.getElementById("gpw").value;var h=await sha(v);if(h===HASH){sessionStorage.setItem(KEY,HASH);localStorage.setItem(KEY,HASH);unlock();}else{document.getElementById("gerr").textContent="Wrong password";}}
  document.getElementById("gbtn").addEventListener("click",tryPw);
  document.getElementById("gpw").addEventListener("keydown",function(e){if(e.key==="Enter")tryPw();});
})();
</script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
